<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title th:text="${'登录系统 - '+title}">登陆系统</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="icon" href="/favicon.svg" type="image/x-icon">
    <link rel="stylesheet" th:href="${cdn + '/layui/2.8.18/css/layui.min.css'}">
    <link rel="stylesheet" href="/static/admin/css/login.css">
</head>
<body>
<form class="layui-form login">
    <div class="login-container">
        <h1>登录系统</h1>
        <div class="layui-form-item">
            <div class="layui-input-wrap">
                <div class="layui-input-prefix">
                    <i class="layui-icon layui-icon-password"></i>
                </div>
                <input type="password" name="password" value="" lay-verify="required" placeholder="请填写密码"
                       lay-reqtext="请填写密码" autocomplete="off" class="layui-input" lay-affix="eye">
            </div>
        </div>
        <div class="layui-form-item">
            <input type="checkbox" name="remember" lay-skin="primary" title="记住密码">
        </div>
        <div class="layui-form-item">
            <button class="layui-btn layui-btn-fluid" id="login" type="button">登录</button>
        </div>
        <div class="layui-form-item">
            <a class="layui-btn layui-btn-primary layui-btn-fluid" href="/">返回</a>
        </div>
    </div>
</form>

<input type="hidden" id="msg" th:value="${msg}">

<script th:src="${cdn + '/layui/2.8.18/layui.min.js'}"></script>
<script src="/static/admin/js/login.js"></script>
</body>
</html>
