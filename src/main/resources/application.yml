server:
  port: 8080
  tomcat:
    relaxed-query-chars: \,<,>, [,],^,`,{,|,}
    relaxed-path-chars: \,<,>, [,],^,`,{,|,}

spring:
  datasource:
    url: jdbc:h2:file:/home/toolbox/data
    driverClassName: org.h2.Driver
  sql:
    init:
      schema-locations: classpath:init/schema.sql
      data-locations: classpath:init/data.sql
      mode: always
      continue-on-error: true

mybatis-plus:
  global-config:
    enable-sql-runner: true