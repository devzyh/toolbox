<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Base64-软件工具箱</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="//cdn.staticfile.net/layui/2.9.9/css/layui.min.css">
    <link rel="stylesheet" href="/code/css/ext.css">
</head>

<body>
    <div>
        <div class="layui-tab layui-tab-brief">
            <ul class="layui-tab-title">
                <li><a href="/code">URLEncode</a></li>
                <li class="layui-this"><a href="/code/base64">Base64</a></li>
                <li><a href="/code/md5">MD5加密</a></li>
                <li><a href="/code/unicode">Unicode</a></li>
            </ul>
            <div class=" layui-tab-content">
                <div class="layui-tab-item layui-show">
                    <div class="layui-form">
                        <div class="layui-form-item layui-form-text">
                            <label class="layui-form-label">输入</label>
                            <div class="layui-input-block">
                                <textarea id="baseInput" placeholder="请输入内容" class="layui-textarea"
                                    rows="10"></textarea>
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-input-block">
                                <button id="baseEncode" class="layui-btn layui-btn-normal">编码</button>
                                <button id="baseDecode" class="layui-btn layui-btn-warm">解码</button>
                                <button id="baseExchange" class="layui-btn">交换</button>
                                <button id="baseClear" class="layui-btn layui-btn-danger">清空</button>
                            </div>
                        </div>
                        <div class="layui-form-item layui-form-text">
                            <label class="layui-form-label">输出</label>
                            <div class="layui-input-block">
                                <textarea id="baseOutput" placeholder="这里输出处理结果" class="layui-textarea"
                                    readonly="readonly" rows="10"></textarea>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="//cdn.staticfile.net/layui/2.9.9/layui.min.js"></script>
    <script src="js/ext.js"></script>
</body>

</html>
