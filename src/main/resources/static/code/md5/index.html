<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>MD5加密-软件工具箱</title>
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="//cdn.staticfile.net/layui/2.9.9/css/layui.min.css">
    <link rel="stylesheet" href="/code/css/ext.css">
</head>

<body>
    <div>
        <div class="layui-tab layui-tab-brief">
            <ul class="layui-tab-title">
                <li><a href="/code">URLEncode</a></li>
                <li><a href="/code/base64">Base64</a></li>
                <li class="layui-this"><a href="/code/md5">MD5加密</a></li>
                <li><a href="/code/unicode">Unicode</a></li>
            </ul>
            <div class=" layui-tab-content">
                <div class="layui-tab-item layui-show">
                    <div class="layui-form">
                        <div class="layui-form-item layui-form-text">
                            <label class="layui-form-label">输入</label>
                            <div class="layui-input-block">
                                <textarea id="md5Input" placeholder="请输入内容" class="layui-textarea" rows="10"></textarea>
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-input-block">
                                <button id="md5" class="layui-btn layui-btn-normal">生成32位小写</button>
                                <button id="md5Upper" class="layui-btn layui-btn-normal">生成32位大写</button>
                                <button id="md516" class="layui-btn layui-btn-normal">生成16位小写</button>
                                <button id="md516Upper" class="layui-btn layui-btn-normal">生成16位大写</button>
                                <button id="md5Clear" class="layui-btn layui-btn-danger">清空</button>
                            </div>
                        </div>
                        <div class="layui-form-item layui-form-text">
                            <label class="layui-form-label">输出</label>
                            <div class="layui-input-block">
                                <textarea id="md5Output" placeholder="这里输出处理结果" class="layui-textarea"
                                    readonly="readonly" rows="10"></textarea>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="//cdn.staticfile.net/layui/2.9.9/layui.min.js"></script>
    <script src="//cdn.staticfile.net/crypto-js/4.2.0/crypto-js.min.js"></script>
    <script src="js/ext.js"></script>
</body>

</html>
