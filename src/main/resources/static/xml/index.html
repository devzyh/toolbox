<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>XML编辑器-软件工具箱</title>
    <link rel="icon" href="/favicon.svg" type="image/x-icon">
    <link rel="stylesheet" href="//cdn.staticfile.net/layui/2.9.9/css/layui.min.css">
    <link rel="stylesheet" href="css/ext.css">
</head>

<body>

    <div class="layui-card">
        <div class="layui-card-header">
            <div class="layui-form layui-inline layui-hide-xs">
                <select lay-filter="xml-indent">
                    <option selected value="  ">2个空格缩进</option>
                    <option value="    ">4个空格缩进</option>
                    <option value="        ">8个空格缩进</option>
                </select>
            </div>
            <button type="button" class="layui-btn layui-bg-blue layui-btn-sm" id="format">格式化XML</button>
            <button type="button" class="layui-btn layui-bg-orange layui-btn-sm" id="compress">压缩XML</button>
            <button type="button" class="layui-btn layui-bg-red layui-btn-sm" id="clear">清空输入</button>
        </div>
    </div>
    <div class="layui-card-body">
        <div id="editor"></div>
    </div>
    </div>

    <script src="//cdn.staticfile.net/layui/2.9.9/layui.min.js"></script>
    <script src="//cdn.staticfile.net/ace/1.5.3/ace.min.js"></script>
    <script src="//cdn.staticfile.net/jquery/2.2.4/jquery.min.js"></script>
    <script src="js/jquery.format.js"></script>
    <script src="js/ext.js"></script>
</body>

</html>
